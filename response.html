<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลการดำเนินการ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Sarabun',sans-serif; background:#f5f7fa; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:20px; padding:40px 32px; text-align:center; max-width:360px; width:90%; box-shadow:0 4px 20px rgba(0,0,0,.1); }
  .icon { font-size:64px; margin-bottom:16px; }
  h2 { font-size:22px; font-weight:700; margin-bottom:8px; }
  p { font-size:15px; color:#555; margin-bottom:24px; }
  .btn { padding:12px 32px; background:#2D9CDB; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">✅</div>
  <h2 id="title">สำเร็จ</h2>
  <p id="detail">ดำเนินการเรียบร้อยแล้ว</p>
  <button class="btn" onclick="close()">ปิดหน้านี้</button>
</div>
<script>
async function init() {
  await liff.init({ liffId: '2010331145-0cklW9Rs' });
  const p = new URLSearchParams(window.location.search);
  if (p.get('status') === 'error') {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = 'เกิดข้อผิดพลาด';
    document.getElementById('title').style.color = '#EB5757';
  }
  if (p.get('msg')) document.getElementById('detail').textContent = decodeURIComponent(p.get('msg'));
}
function close() { if (liff.isInClient()) liff.closeWindow(); else window.close(); }
init();
</script>
</body>
</html>
